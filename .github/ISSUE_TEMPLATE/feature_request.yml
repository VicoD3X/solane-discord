name: Feature request
description: Suggest a public-safe Solane AI improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow would this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Solane AI do?
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Public repository boundary
      options:
        - label: This does not require Discord tokens, private ESI credentials, pricing formulas or private risk formulas in this repository.
          required: true

