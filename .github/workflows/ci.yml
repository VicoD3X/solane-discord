name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checks:
    name: Lint, test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Ruff
        run: python -m ruff check .

      - name: Pytest
        run: python -m pytest

      - name: Compile
        run: python -m compileall -q solane_ai tests

      - name: Docker build
        run: docker build .

